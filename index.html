<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALEIDXSCOPE - 活动入口</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="github-footer.css">
    <script defer src="https://s.awmc.cc/script.js" data-website-id="4416a8d7-49f0-4b07-a14a-e82d30716b2a"></script>
</head>
<body>
    <div class="container">
        <!-- 活动页面横幅 -->
        <div class="activity-banner">
            <h1 class="banner-title">KALEIDXSCOPE</h1>
            <p class="banner-subtitle">活动入口</p>
        </div>

        <!-- 门列表区域 -->
        <div class="doors-section">
            <h2 class="section-title">可开启的门</h2>
            <div class="doors-grid">
                <!-- 蓝色之门 -->
                <div class="door-card" onclick="window.location.href='BLUEKALEIDXSCOPE/index.html'" data-umami-event="click-blue-door">
                    <div class="door-image-wrapper">
                        <img src="KALEIDXSCOPE_PNG/blue.png" alt="蓝色之门" class="door-image">
                    </div>
                </div>

                <!-- 白色之门 -->
                <div class="door-card" onclick="window.location.href='WHITEKALEIDXSCOPE/index.html'" data-umami-event="click-white-door">
                    <div class="door-image-wrapper">
                        <img src="KALEIDXSCOPE_PNG/white.png" alt="白色之门" class="door-image">
                    </div>
                </div>

                <!-- 紫色之门（倒计时结束后正常显示，否则需连续点击屏幕以神秘效果解锁） -->
                <div class="door-card purple-door-card" id="purple-door-card" onclick="window.location.href='PURPLEKALEIDXSCOPE/index.html'" data-umami-event="click-purple-door">
                    <div class="door-image-wrapper">
                        <img src="KALEIDXSCOPE_PNG/purple.png" alt="紫色之门" class="door-image" onerror="this.onerror=null;this.style.display='none';var p=this.nextElementSibling;if(p)p.style.display='flex'">
                        <div class="door-placeholder door-placeholder-purple" style="display:none;min-height:200px;align-items:center;justify-content:center;font-size:2em;font-weight:bold;color:#7c3aed">紫の扉</div>
                    </div>
                </div>

                <!-- 黑色之门（区域开放时间待定，需连续点击屏幕14次解锁） -->
                <div class="door-card black-door-card" id="black-door-card" onclick="window.location.href='BLACKKALEIDXSCOPE/index.html'" data-umami-event="click-black-door">
                    <div class="door-image-wrapper">
                        <img src="KALEIDXSCOPE_PNG/black.png" alt="黑色之门" class="door-image" onerror="this.onerror=null;this.style.display='none';var p=this.nextElementSibling;if(p)p.style.display='flex'">
                        <div class="door-placeholder door-placeholder-black" style="display:none;min-height:200px;align-items:center;justify-content:center;font-size:2em;font-weight:bold;color:#666">黒の扉</div>
                    </div>
                </div>

                <!-- 未来可以添加更多门 -->
                <!-- 
                <div class="door-card coming-soon">
                    <div class="door-image-wrapper">
                        <div class="door-placeholder">即将开放</div>
                        <div class="door-overlay">
                            <span class="door-label">敬请期待</span>
                        </div>
                    </div>
                </div>
                -->
            </div>
        </div>

        <!-- 说明文字 -->
        <div class="info-section">
            <p class="info-text">点击门卡进入对应的解锁攻略页面</p>
        </div>

        <!-- 社群 -->
        <div class="community-section">
            <a href="https://qm.qq.com/q/YyCOXfCveY" target="_blank" rel="noopener noreferrer" class="community-link" data-umami-event="community-link-home">加入社群参与讨论！</a>
        </div>
    </div>

    <script src="script.js"></script>
    <div class="github-footer-float">
        <a href="https://github.com/Michaelwucoc/KALEIDXSCOPE" target="_blank" rel="noopener noreferrer" class="github-footer-link" data-umami-event="github-link" title="GitHub 源码">

        </a>
        <span class="github-footer-update">更新于 __LAST_UPDATE__</span>
    </div>
    <script src="github-footer.js"></script>
</body>
</html>
